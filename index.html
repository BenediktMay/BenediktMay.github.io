<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essensplaner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { padding-top: 20px; }
        .gericht-card { padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #111928; }
        .score-badge { float: right; background: #39495c; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .veto-warnung { color: #ff6b6b; font-size: 0.85em; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <main class="container">
        <h2>Wer isst heute mit?</h2>
        <div id="loading">Lade Daten aus GitHub...</div>
        
        <fieldset id="personen-auswahl" style="display: none;"></fieldset>
        <button id="berechnen-btn" style="display: none;" onclick="berechneRanking()">Gerichte vorschlagen</button>

        <hr>

        <h2>Vorschläge</h2>
        <div id="gerichte-liste"></div>
    </main>

    <script>
        let appData = null;

        // Punkte-System: Veto bringt -3 Punkte
        const punkteSystem = {
            "mag": 2,
            "neutral": 1,
            "nein": -3
        };

        // 1. Daten aus der JSON-Datei von GitHub laden
        async function ladeDaten() {
            try {
                // Holt die data.json, die im gleichen Ordner liegt
                // Ein Cache-Buster (?v=...) verhindert, dass das Handy alte Daten lädt
                const response = await fetch('data.json?v=' + new Date().getTime());
                appData = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('personen-auswahl').style.display = 'block';
                document.getElementById('berechnen-btn').style.display = 'block';
                
                bauePersonenAuswahl();
            } catch (error) {
                document.getElementById('loading').innerText = "Fehler beim Laden der Daten. Ist die data.json vorhanden?";
                console.error("Ladefehler:", error);
            }
        }

        // 2. Checkboxen generieren
        function bauePersonenAuswahl() {
            const container = document.getElementById('personen-auswahl');
            container.innerHTML = "";
            appData.personen.forEach(person => {
                container.innerHTML += `
                    <label>
                        <input type="checkbox" name="person" value="${person}" checked>
                        ${person}
                    </label>
                `;
            });
            berechneRanking();
        }

        // 3. Logik & Berechnung mit -3 Punkten
        function berechneRanking() {
            if (!appData) return;

            const checkboxes = document.querySelectorAll('input[name="person"]:checked');
            const esser = Array.from(checkboxes).map(cb => cb.value);

            if(esser.length === 0) {
                document.getElementById('gerichte-liste').innerHTML = "<p>Bitte wähle jemanden aus.</p>";
                return;
            }

            let ranking = appData.gerichte.map(gericht => {
                let score = 0;
                let vetoPersonen = [];

                esser.forEach(person => {
                    // Falls jemand nicht in der JSON steht, gehen wir von "neutral" aus
                    let vorliebeText = gericht.vorlieben[person] || "neutral"; 
                    let punkte = punkteSystem[vorliebeText];

                    if (punkte === -3) {
                        vetoPersonen.push(person);
                    }
                    score += punkte;
                });

                return { name: gericht.name, score: score, vetos: vetoPersonen };
            });

            // Sortieren: Höchste Punktzahl ganz nach oben
            ranking.sort((a, b) => b.score - a.score);

            // 4. Anzeige aufbauen
            const listeContainer = document.getElementById('gerichte-liste');
            listeContainer.innerHTML = "";

            ranking.forEach(item => {
                let hatVeto = item.vetos.length > 0;
                let kartenStyle = hatVeto ? "border-left: 4px solid #ff6b6b;" : "border-left: 4px solid #a6e3a1;";
                
                let vetoText = hatVeto ? `<span class="veto-warnung">Veto von: ${item.vetos.join(', ')}</span>` : '';

                listeContainer.innerHTML += `
                    <div class="gericht-card" style="${kartenStyle}">
                        <strong>${item.name}</strong> 
                        <span class="score-badge">Score: ${item.score}</span>
                        ${vetoText}
                    </div>
                `;
            });
        }

        // App starten
        ladeDaten();
    </script>
</body>
</html>
