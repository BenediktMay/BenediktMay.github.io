<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essens-Planer Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root { --pico-font-size: 90%; }
        body { padding-bottom: 50px; }
        .gericht-card { cursor: pointer; padding: 12px; margin-bottom: 8px; border-radius: 8px; background: #1a212e; border-left: 5px solid #374151; transition: background 0.2s; }
        .gericht-card:active { background: #2d3748; }
        .score-badge { float: right; background: #39495c; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; }
        .details { margin-top: 10px; padding-top: 10px; border-top: 1px solid #374151; font-size: 0.85em; display: none; }
        .active .details { display: block; }
        .vorliebe-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; margin-right: 5px; margin-bottom: 5px; }
        .tag-mag { background: #2e7d32; }
        .tag-neutral { background: #546e7a; }
        .tag-nein { background: #c62828; }
        footer { position: fixed; bottom: 0; width: 100%; background: #111928; padding: 10px 0; border-top: 1px solid #374151; }
        .admin-section { background: #141b24; padding: 20px; border-radius: 10px; margin-top: 40px; border: 1px dashed #374151; }
    </style>
</head>
<body>

<main class="container">
    <header>
        <h1>🍽️ Was essen wir?</h1>
    </header>

    <section id="auswahl-bereich">
        <h3>Wer isst mit?</h3>
        <div id="personen-checkboxen" style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;"></div>
        <button class="contrast" onclick="berechneRanking()">Plan erstellen</button>
    </section>

    <hr>

    <section id="ranking-bereich">
        <h3>Vorschläge</h3>
        <div id="gerichte-liste">Lade Daten...</div>
    </section>

    <section class="admin-section">
        <h3>Daten verwalten</h3>
        <p><small>Hier kannst du neue Gerichte hinzufügen. Danach die Datei herunterladen und bei GitHub hochladen.</small></p>
        
        <label for="neues-gericht">Neues Gericht Bezeichnung:</label>
        <input type="text" id="neues-gericht" placeholder="z.B. Sushi">
        
        <div id="neue-vorlieben-inputs"></div>
        <button onclick="gerichtHinzufuegen()">Gericht zur Liste hinzufügen</button>
        
        <div style="margin-top: 20px;">
            <button class="secondary" onclick="downloadJSON()">💾 data.json herunterladen</button>
        </div>
    </section>
</main>

<script>
    let appData = { personen: [], gerichte: [] };
    const punkteMap = { "mag": 2, "neutral": 1, "nein": -3 };

    async function initialisiere() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            appData = await res.json();
        } catch (e) {
            console.log("Keine data.json gefunden, nutze Demo-Daten");
            appData = { personen: ["User1"], gerichte: [] };
        }
        renderPersonenCheckboxes();
        renderAdminInputs();
        berechneRanking();
    }

    function renderPersonenCheckboxes() {
        const container = document.getElementById('personen-checkboxen');
        container.innerHTML = appData.personen.map(p => `
            <label><input type="checkbox" name="esser" value="${p}" checked> ${p}</label>
        `).join('');
    }

    function renderAdminInputs() {
        const container = document.getElementById('neue-vorlieben-inputs');
        container.innerHTML = "<strong>Vorlieben für neues Gericht:</strong>";
        appData.personen.forEach(p => {
            container.innerHTML += `
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                    <span style="width: 80px;">${p}:</span>
                    <select id="pref-${p}" style="margin-bottom: 0;">
                        <option value="mag">Mag ich</option>
                        <option value="neutral" selected>Neutral</option>
                        <option value="nein">Mag ich nicht (-3)</option>
                    </select>
                </div>
            `;
        });
    }

    function gerichtHinzufuegen() {
        const name = document.getElementById('neues-gericht').value;
        if(!name) return alert("Name fehlt!");
        
        let neueVorlieben = {};
        appData.personen.forEach(p => {
            neueVorlieben[p] = document.getElementById(`pref-${p}`).value;
        });

        appData.gerichte.push({ name: name, vorlieben: neueVorlieben });
        document.getElementById('neues-gericht').value = "";
        berechneRanking();
        alert("Gericht lokal hinzugefügt! Vergiss nicht, die Datei am Ende herunterzuladen.");
    }

    function berechneRanking() {
        const ausgewaehlt = Array.from(document.querySelectorAll('input[name="esser"]:checked')).map(c => c.value);
        const liste = document.getElementById('gerichte-liste');
        
        if(ausgewaehlt.length === 0) {
            liste.innerHTML = "Niemand isst mit? Dann gibt's wohl nichts.";
            return;
        }

        let ergebnisse = appData.gerichte.map(g => {
            let score = 0;
            let details = [];
            ausgewaehlt.forEach(p => {
                let v = g.vorlieben[p] || "neutral";
                score += punkteMap[v];
                details.push({person: p, status: v});
            });
            return { ...g, score, details };
        });

        ergebnisse.sort((a, b) => b.score - a.score);

        liste.innerHTML = ergebnisse.map(g => `
            <div class="gericht-card" onclick="this.classList.toggle('active')">
                <span class="score-badge">Punkte: ${g.score}</span>
                <strong>${g.name}</strong>
                <div class="details">
                    ${g.details.map(d => `<span class="vorliebe-tag tag-${d.status}">${d.person}: ${d.status}</span>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "data.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    initialisiere();
</script>
</body>
</html>
