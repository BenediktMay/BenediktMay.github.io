<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essensmatrix</title>
    <style>
        /* Basic Reset & Body Styling */
        * {
            box-sizing: border-box; /* Include padding and border in element's total width and height */
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4; /* Light background for contrast */
            -webkit-tap-highlight-color: transparent; /* Remove blue tap highlight on mobile */
        }

        /* Button Container */
        #button-container {
            display: flex;
            justify-content: center; /* Center buttons horizontally */
            align-items: center; /* Center buttons vertically */
            gap: 20px; /* Space between buttons */
            padding: 30px;
            min-height: 100vh; /* Make container take full viewport height */
            flex-wrap: wrap; /* Allow buttons to wrap on smaller screens if needed */
        }

        /* Button Styling */
        .action-button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            flex-grow: 0; /* Don't allow buttons to grow */
            flex-shrink: 0; /* Don't allow buttons to shrink excessively */
        }

        .action-button:hover {
            background-color: #45a049; /* Darker green on hover */
        }

        .action-button:active {
             background-color: #3e8e41; /* Even darker green when pressed */
        }


        /* Image Overlay Container */
        #image-overlay {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1000; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed (though image should fit) */
            background-color: rgba(0, 0, 0, 0.9); /* Black background with opacity */
            justify-content: center; /* Center content horizontally */
            align-items: center; /* Center content vertically */
            flex-direction: column; /* Stack image and close button */
            padding: 10px; /* Add some padding around the edge */
        }

        /* The Image */
        #data-matrix-image {
            display: block;
            margin: auto; /* Helps centering if flex doesn't fully center */
            max-width: 95%; /* Max width relative to overlay */
            max-height: 85vh; /* Max height relative to viewport height, leaves space for close button */
            object-fit: contain; /* Scale the image down preserving aspect ratio */
            border: 3px solid white; /* Optional: White border to clearly define image */
        }

        /* Close Button for Overlay */
        #close-button {
            position: absolute; /* Position relative to the overlay */
            top: 15px;
            right: 25px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0 10px;
            line-height: 1; /* Adjust line height for better positioning */
            transition: color 0.3s ease;
        }
         #close-button:hover,
         #close-button:focus {
            color: #bbb;
            text-decoration: none;
         }

    </style>
</head>
<body>

    <main style="padding: 30px;">
        <h1>Essensmatrix</h1>
        <div style="margin-bottom: 20px;display:flex;flex-wrap:wrap;gap:20px;align-items:end;">
            <div>
                <label for="neues-gericht-matrix"><b>Neues Gericht:</b></label>
                <input id="neues-gericht-matrix" type="text" placeholder="z.B. Kartoffelauflauf" style="margin-right:10px;">
                <button id="add-gericht-btn" class="action-button" style="padding:8px 18px;font-size:1em;">Hinzufügen</button>
            </div>
            <div style="font-size:0.95em;color:#666;">Tipp: Gericht löschen mit rotem X in der Tabelle</div>
        </div>
        <div id="matrix-container">Lade Daten...</div>
        <div style="margin-top: 30px;">
            <button id="save-btn" class="action-button">Speichern</button>
            <button id="download-btn" class="action-button">Herunterladen</button>
        </div>
    </main>

    <script>
    let appData = { personen: [], gerichte: [] };
    const vorliebeZustand = ["nein", "neutral", "mag"];
    const vorliebeFarben = { nein: "#c62828", neutral: "#546e7a", mag: "#2e7d32" };

    async function ladeDaten() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            appData = await res.json();
        } catch (e) {
            appData = { personen: [], gerichte: [] };
        }
        renderMatrix();
    }

    function renderMatrix() {
        const container = document.getElementById('matrix-container');
        if (!appData.personen.length || !appData.gerichte.length) {
            container.innerHTML = "Keine Daten gefunden.";
            return;
        }
        let html = '<table style="border-collapse:collapse; width:100%; max-width:1200px; background:#fff;">';
        html += '<thead><tr><th style="position:sticky;left:0;background:#eee;z-index:2;">Gericht</th>';
        appData.personen.forEach(p => {
            html += `<th>${p}</th>`;
        });
        html += '<th style="width:40px;"></th></tr></thead><tbody>';
        appData.gerichte.forEach((g, gi) => {
            html += `<tr>`;
            html += `<td style="position:sticky;left:0;background:#f8f8f8;z-index:1;font-weight:bold;">${g.name}</td>`;
            appData.personen.forEach((p, pi) => {
                let v = g.vorlieben[p] || "neutral";
                html += `<td style="text-align:center;cursor:pointer;background:${vorliebeFarben[v]};color:#fff;font-weight:bold;" onclick="toggleVorliebe(${gi},'${p}',this)">${v}</td>`;
            });
            html += `<td style="text-align:center;"><button onclick="deleteGericht(${gi})" style="background:#c62828;color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:1.2em;cursor:pointer;">×</button></td>`;
            html += `</tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    window.deleteGericht = function(gi) {
        const gericht = appData.gerichte[gi]?.name || '';
        if(confirm(`Gericht wirklich löschen?\n\n${gericht}`)) {
            appData.gerichte.splice(gi, 1);
            renderMatrix();
        }
    }

    window.toggleVorliebe = function(gi, person, cell) {
        let v = appData.gerichte[gi].vorlieben[person] || "neutral";
        let idx = vorliebeZustand.indexOf(v);
        let next = vorliebeZustand[(idx + 1) % vorliebeZustand.length];
        appData.gerichte[gi].vorlieben[person] = next;
        cell.textContent = next;
        cell.style.background = vorliebeFarben[next];
    }

    document.getElementById('save-btn').onclick = function() {
        fetch('data.json', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(appData, null, 2)
        }).then(() => alert('Gespeichert! (Hinweis: Funktioniert nur mit Backend)'));
    };

    document.getElementById('download-btn').onclick = function() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "data.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    };

    document.getElementById('add-gericht-btn').onclick = function() {
        const name = document.getElementById('neues-gericht-matrix').value.trim();
        if(!name) return alert('Bitte einen Namen eingeben!');
        if(appData.gerichte.some(g => g.name.toLowerCase() === name.toLowerCase())) return alert('Gericht existiert bereits!');
        let vorlieben = {};
        appData.personen.forEach(p => vorlieben[p] = "neutral");
        appData.gerichte.push({ name, vorlieben });
        document.getElementById('neues-gericht-matrix').value = '';
        renderMatrix();
    };

    ladeDaten();
    </script>

</body>
</html>
